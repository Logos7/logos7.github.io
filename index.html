<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Logos7 — kod, FPGA, gry, obrazy, muzyka i eksperymenty.">
  <meta name="theme-color" content="#07080b">
  <title>Logos7 — kod, sprzęt, sztuka</title>
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body id="top">
  <main>
    <section class="hero">
      <div class="container hero-container">
        <div class="hero-grid">
          <div class="reveal">
            <p class="eyebrow">Osobiste uniwersum twórcze</p>
            <h1>LOGOS<span>7</span></h1>
            <p class="hero-lead">Tworzę projekty łączące kod, sprzęt i sztukę.</p>
          </div>

          <div class="hero-symbol reveal" aria-hidden="true">
            <img src="/assets/images/logos7-universe-symbol.png" alt="" width="1254" height="1254">
          </div>
        </div>

        <div class="hero-tiles reveal">
          <a class="hero-tile" href="/projects/">
            <div class="hero-tile-content">
              <div>
                <h2 class="hero-tile-title">Projekty</h2>
                <p class="hero-tile-description">Kod, FPGA, gry, grafika, muzyka i eksperymenty.</p>
              </div>
              <span class="hero-tile-arrow" aria-hidden="true">→</span>
            </div>
          </a>

          <a class="hero-tile" href="https://github.com/Logos7" target="_blank" rel="noreferrer">
            <div class="hero-tile-content">
              <div>
                <h2 class="hero-tile-title">GitHub</h2>
                <p class="hero-tile-description">Repozytoria, kod źródłowy i bieżące eksperymenty.</p>
              </div>
              <span class="hero-tile-arrow" aria-hidden="true">↗</span>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>© <span data-year></span> Logos7</div>
      <nav class="footer-links" aria-label="Nawigacja w stopce">
        <a href="/">Home</a>
        <a href="#top">Do góry ↑</a>
      </nav>
    </div>
  </footer>

  <script src="/assets/js/site.js"></script>
</body>
</html>
